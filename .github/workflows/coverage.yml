name: Coverage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov "genbadge[coverage]"

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml tests/ || true

      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o coverage.svg

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git push
