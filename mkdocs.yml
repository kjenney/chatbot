site_name: AI Chatbot with Memory
site_description: A persistent AI chatbot powered by Ollama with a sub-agent framework and web interface
site_url: https://kjenney.github.io/chatbot/
repo_url: https://github.com/kjenney/chatbot
repo_name: kjenney/chatbot

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: QUICKSTART.md
  - Web Interface: WEB_INTERFACE.md
  - Sub-Agents:
    - Overview: SUB_AGENTS.md
    - Gmail Agent: GMAIL_AGENT.md
  - Benchmarking: BENCHMARKING.md
  - Plugin Guide: PLUGIN_GUIDE.md
  - Reference: reference.md
